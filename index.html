<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Of Me · 赛博自己</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Georgia", "Times New Roman", "Songti SC", serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            /* 深蓝渐变背景 */
            background: linear-gradient(145deg, #091a2e 0%, #132f4a 35%, #1a4a6e 70%, #0f2a40 100%);
            background-attachment: fixed;
        }

        /* ===== 毛玻璃卡片容器 ===== */
        .container {
            max-width: 780px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.045);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 56px 44px 48px;
            border-radius: 64px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 粉色点缀光晕 */
        .container::before {
            content: "";
            position: absolute;
            top: -80px;
            right: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 150, 180, 0.20), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container::after {
            content: "";
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 120, 160, 0.15), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* 所有内容在光晕上层 */
        .container>* {
            position: relative;
            z-index: 1;
        }

        /* ===== 1. 主标题 ===== */
        .main-title {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 10px;
            color: #dcebf7;
            text-shadow: 0 0 40px rgba(90, 180, 255, 0.20), 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 4px;
            line-height: 1.1;
        }

        /* 主标题英文装饰线 */
        .title-ornament {
            font-size: 13px;
            letter-spacing: 6px;
            color: rgba(180, 210, 235, 0.35);
            font-weight: 300;
            font-style: italic;
            margin-bottom: 18px;
            font-family: "Georgia", serif;
        }

        /* ===== 2. 副标题（闪烁深蓝动画） ===== */
        .subtitle {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #2a6b9e;
            animation: breatheBlue 2.8s ease-in-out infinite;
            margin-bottom: 34px;
            padding-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        @keyframes breatheBlue {
            0% {
                color: #1a4f7a;
                text-shadow: 0 0 6px rgba(40, 120, 200, 0.15);
            }
            50% {
                color: #3a8fc9;
                text-shadow: 0 0 20px rgba(60, 150, 230, 0.35);
            }
            100% {
                color: #1a4f7a;
                text-shadow: 0 0 6px rgba(40, 120, 200, 0.15);
            }
        }

        /* ===== 3. 自我介绍（版本C·温柔邀请） ===== */
        .description {
            font-size: 18px;
            line-height: 2.1;
            color: #c8ddec;
            font-weight: 300;
            text-align: left;
            padding: 0 4px;
            margin-bottom: 34px;
            letter-spacing: 0.5px;
        }

        .description .highlight {
            color: #f5b8c9;
            font-weight: 400;
            font-style: italic;
        }

        .description .drop-cap {
            font-size: 28px;
            font-weight: 400;
            color: #e8c4d0;
        }

        /* ===== 分割线 ===== */
        .divider {
            width: 56px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 180, 200, 0.35), transparent);
            margin: 0 auto 34px auto;
            border-radius: 4px;
        }

        /* ===== 4. 赛博回信模块（三层融合） ===== */
        .cyber-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 30px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .cyber-section:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 180, 200, 0.15);
        }

        /* 主标题 */
        .cyber-main {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 5px;
            color: #b5d4ed;
            margin-bottom: 8px;
        }

        /* 引语（来自深海） */
        .cyber-quote {
            font-size: 16px;
            color: #8bb8d9;
            letter-spacing: 2px;
            font-style: italic;
            margin-bottom: 12px;
            opacity: 0.85;
        }

        /* 底部回声小字 */
        .cyber-echo {
            font-size: 13px;
            color: rgba(180, 210, 235, 0.40);
            letter-spacing: 3px;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 14px;
            margin-top: 4px;
        }

        /* 粉色点缀小点 */
        .cyber-echo::before {
            content: "·";
            color: rgba(255, 150, 180, 0.5);
            margin-right: 8px;
        }

        .cyber-echo::after {
            content: "·";
            color: rgba(255, 150, 180, 0.5);
            margin-left: 8px;
        }

        /* ===== 粉色点缀元素 ===== */
        .pink-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 150, 180, 0.30);
            margin: 0 6px;
            vertical-align: middle;
        }

        /* ===== 5. 底部海浪装饰区 ===== */
        .wave-footer {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 28px;
            letter-spacing: 12px;
            opacity: 0.30;
            color: rgba(180, 210, 235, 0.25);
            font-weight: 100;
            user-select: none;
        }

        .wave-footer span {
            display: inline-block;
            animation: waveFloat 3s ease-in-out infinite;
        }

        .wave-footer span:nth-child(2) {
            animation-delay: 0.4s;
        }
        .wave-footer span:nth-child(3) {
            animation-delay: 0.8s;
        }
        .wave-footer span:nth-child(4) {
            animation-delay: 1.2s;
        }
        .wave-footer span:nth-child(5) {
            animation-delay: 1.6s;
        }
        .wave-footer span:nth-child(6) {
            animation-delay: 2.0s;
        }
        .wave-footer span:nth-child(7) {
            animation-delay: 2.4s;
        }

        @keyframes waveFloat {
            0%,
            100% {
                transform: translateY(0px);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-4px);
                opacity: 0.8;
            }
        }

        /* ===== 6. 手机响应式适配 ===== */
        @media (max-width: 600px) {
            .container {
                padding: 32px 18px 30px;
                border-radius: 40px;
            }

            .main-title {
                font-size: 40px;
                letter-spacing: 5px;
            }

            .title-ornament {
                font-size: 11px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 18px;
                letter-spacing: 4px;
                margin-bottom: 24px;
                padding-bottom: 20px;
            }

            .description {
                font-size: 16px;
                line-height: 2;
                padding: 0 2px;
            }

            .cyber-section {
                padding: 22px 16px 18px;
            }

            .cyber-main {
                font-size: 17px;
                letter-spacing: 3px;
            }

            .cyber-quote {
                font-size: 14px;
            }

            .cyber-echo {
                font-size: 12px;
            }

            .wave-footer {
                font-size: 20px;                字体大小: 20px;
                letter-spacing: 8px;
                margin-top: 28px;                上外边距: 28px;
                padding-top: 18px;                上内边距: 18px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 24px 14px 24px;
                border-radius: 32px;
            }

            .main-title {
                font-size: 32px;
                letter-spacing: 3px;
            }

            .subtitle {
                font-size: 15px;
                letter-spacing: 3px;
            }

            .description {
                font-size: 14px;
            }

            .cyber-main {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== 1. 主标题 ===== -->
        <h1 class="main-title">Sea Of Me</h1>
        <div class="title-ornament">✦ a quiet ocean within ✦</div>

        <!-- ===== 2. 副标题（闪烁深蓝） ===== -->
        <div class="subtitle">我的内心海洋</div>

        <!-- ===== 3. 自我介绍（版本C·温柔邀请） ===== -->
        <div class="description">
            <span class="drop-cap">欢</span>迎来到我的内在海域。
            这里没有对错，只有存在。<br />
            我把自己的思绪、情绪和安静的瞬间，
            <span class="highlight">像漂流瓶一样放在这片海里</span>。<br />
            如果你捡到了什么，那是海想让你看到的。
        </div>

        <!-- ===== 分割线 ===== -->
        <div class="divider"></div>

        <!-- ===== 4. 赛博回信模块（三层融合） ===== -->
        <div class="cyber-section">
            <div class="cyber-main">🌊 赛博回信</div>
            <div class="cyber-quote">🐚 来自深海的第1封信 · 即将浮出水面</div>
            <div class="cyber-echo">🌀 你听到的声音，是海在回应你</div>
        </div>

        <!-- ===== 5. 底部海浪装饰 ===== -->
        <div class="wave-footer">
            <span>~</span>
            <span>~</span>
            <span>~</span>
            <span>~</span>
            <span>~</span>
            <span>~</span>
            <span>~</span>
        </div>

    </div>

</body>
</html>
