<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Of Me</title>
    <style>
        /* --- 全局设置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden; /* 防止出现滚动条 */
            
            /* --- 核心背景：深海+太空+粉色温度 --- */
            background: linear-gradient(180deg, 
                #020b1a 0%,   /* 顶部：深邃太空黑 */
                #0d1f3c 40%,  /* 中部：深海蓝 */
                #1a1a2e 70%,  /* 过渡区 */
                #240b36 100%  /* 底部：带一点紫粉色的温度 */
            );
            position: relative;
        }

        /* --- 背景氛围光（模拟极光/星云，不抢戏） --- */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.15) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        /* --- 内容容器 --- */
        .container {
            z-index: 1; /* 保证内容在背景之上 */
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* --- 1. 流光标题 Sea Of Me --- */
        .main-title {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            
            /* 流光文字特效 */
            background: linear-gradient(
                120deg, 
                #ffffff 0%, 
                #a5f2ff 30%, /* 浅蓝 */
                #ff9a9e 60%, /* 粉色 */
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            
            /* 微微的发光阴影，像水母 */
            filter: drop-shadow(0 0 15px rgba(165, 242, 255, 0.4));
        }

        /* --- 2. 中英双语副标题 --- */
        .subtitle-en {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .subtitle-cn {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-bottom: 50px; /* 拉开与图标的距离 */
        }

        /* --- 3. 图标区域 (毛玻璃风格) --- */
        .icon-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .icon-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            
            /* 毛玻璃核心代码 */
            background: rgba(255, 255, 255, 0.05); /* 极淡的白色背景 */
            backdrop-filter: blur(10px);           /* 模糊背后的颜色 */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* 淡淡的边框 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 鼠标悬停效果：变亮、浮起 */
        .icon-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(165, 242, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- 动画定义 --- */
        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes breathe {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .main-title { font-size: 2.5rem; }
            .icon-grid { gap: 15px; }
            .icon-item { width: 60px; height: 60px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- 背景氛围光 -->
    <div class="ambient-glow"></div>

    <div class="container">
        <!-- 1. 大标题 -->
        <h1 class="main-title">Sea Of Me</h1>
        
        <!-- 2. 副标题 -->
        <p class="subtitle-en">Master of your own soul</p>
        <p class="subtitle-cn">做自己心灵的主人</p>

        <!-- 3. 图标区域 (暂时用Emoji占位，等你确认布局后再换链接) -->
        <div class="icon-grid">
            <!-- 这里的 href="#" 代表暂时没有链接，以后我们会填入你的网址 -->
            <a href="#" class="icon-item" title="功能1">🌊</a>
            <a href="#" class="icon-item" title="功能2">🪸</a>
            <a href="#" class="icon-item" title="功能3">🛡️</a>
            <a href="#" class="icon-item" title="功能4">🦄</a>
            <a href="#" class="icon-item" title="关于我">👤</a>
        </div>
    </div>

</body>
</html>
